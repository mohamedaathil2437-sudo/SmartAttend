<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | 24h Static Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .code-font { font-family: 'Courier New', monospace; letter-spacing: 0.2em; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <span class="text-xl font-800 tracking-tighter text-indigo-600">SmartAttend<span class="text-slate-900">.</span></span>
        <div id="navActions" class="hidden flex gap-3">
            <button onclick="logout()" class="text-slate-400 font-bold text-xs hover:text-red-500">Logout</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">

        <section id="loginView" class="view-section active mt-20 text-center">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200">
                <h1 class="text-3xl font-800 mb-2">Welcome</h1>
                <p class="text-slate-400 mb-8 font-medium">College Attendance System</p>
                <button id="googleBtn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition">Sign in with Google</button>
            </div>
        </section>

        <section id="roleView" class="view-section mt-10 space-y-4">
            <h2 class="text-2xl font-800 text-center mb-6">Choose Account Type</h2>
            <button onclick="saveRole('student')" class="w-full bg-white p-6 rounded-2xl border-2 border-white hover:border-indigo-600 font-bold shadow-sm transition-all">🎓 I am a Student</button>
            <button onclick="saveRole('teacher')" class="w-full bg-white p-6 rounded-2xl border-2 border-white hover:border-rose-500 font-bold shadow-sm transition-all">👨‍🏫 I am a Teacher</button>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-200">
                <h2 class="text-xl font-800 mb-2 text-center">Enter Daily Code</h2>
                <p class="text-indigo-100 text-xs text-center mb-6 opacity-80">Get the 6-digit code from your teacher</p>
                <input type="text" id="codeEntry" maxlength="6" class="w-full p-5 rounded-2xl text-slate-900 text-5xl font-black text-center code-font mb-4 outline-none" placeholder="000000">
                <button onclick="submitAttendance()" class="w-full bg-white text-indigo-600 font-900 py-5 rounded-2xl hover:bg-slate-50 shadow-lg active:scale-95 transition-all text-lg">Mark Present</button>
            </div>
            <div id="studentHistory" class="space-y-3"></div>
        </section>

        <section id="teacherView" class="view-section text-center space-y-6">
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-xl shadow-slate-200">
                <h3 class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-4">Today's Active Code</h3>
                <div id="displayCode" class="text-7xl font-900 text-slate-200 mb-8 code-font">------</div>
                
                <div class="space-y-3">
                    <button id="sessionBtn" onclick="toggleSession()" class="w-full bg-indigo-600 text-white font-800 py-5 rounded-2xl shadow-lg shadow-indigo-100">Generate New Code</button>
                    <button onclick="manualResetAndExport()" class="w-full bg-rose-50 text-rose-600 border border-rose-100 font-800 py-4 rounded-2xl hover:bg-rose-100 transition-all text-sm">End Day & Save .txt</button>
                </div>
                <p class="mt-6 text-[10px] font-bold text-slate-400">Code will persist for 24 hours or until Reset.</p>
            </div>
            
            <div class="bg-white p-6 rounded-[2rem] border text-left">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-800 text-slate-800">Student Logs</h3>
                    <span id="count" class="bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="teacherLogs" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;

        // UI CORE
        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // AUTH ENGINE
        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('navActions').classList.remove('hidden');
                    routeUser();
                } else { switchView('roleView'); }
            } else { switchView('loginView'); }
        });

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("Teacher PIN:") !== '431298') return;
            await setDoc(doc(db, "users", auth.currentUser.uid), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, role });
            location.reload();
        };

        function routeUser() {
            if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
            else { switchView('studentView'); initStudent(); }
        }

        // TEACHER ENGINE (Static 24h Code)
        window.toggleSession = async () => {
            const ref = doc(db, "sessions", "LIVE_ROOM");
            const newCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            await setDoc(ref, { 
                code: newCode, 
                active: true, 
                date: new Date().toDateString() 
            });
            
            document.getElementById('displayCode').innerText = newCode;
            document.getElementById('displayCode').classList.replace('text-slate-200', 'text-indigo-600');
        };

        window.manualResetAndExport = async () => {
            if (!confirm("This will save the logs and CLEAR the attendance for a new session. Continue?")) return;
            const q = query(collection(db, "attendance"), where("date", "==", new Date().toDateString()));
            const snap = await getDocs(q);
            
            let log = `Attendance Report: ${new Date().toLocaleDateString()}\n`;
            log += `Total Students: ${snap.size}\n`;
            log += `--------------------------------\n`;
            
            const batch = writeBatch(db);
            snap.forEach(d => {
                log += `[✓] ${d.data().name}\n`;
                batch.delete(d.ref); // Wipe database for next day
            });

            const blob = new Blob([log], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Attendance_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();

            await batch.commit();
            await deleteDoc(doc(db, "sessions", "LIVE_ROOM"));
            location.reload();
        };

        function initTeacher() {
            // Real-time listener for the UI code
            onSnapshot(doc(db, "sessions", "LIVE_ROOM"), (snap) => {
                if(snap.exists() && snap.data().active) {
                    document.getElementById('displayCode').innerText = snap.data().code;
                    document.getElementById('displayCode').classList.replace('text-slate-200', 'text-indigo-600');
                }
            });

            onSnapshot(collection(db, "attendance"), (snap) => {
                document.getElementById('count').innerText = snap.size;
                document.getElementById('teacherLogs').innerHTML = snap.docs
                    .map(d => `<div class="p-3 bg-slate-50 rounded-xl border border-slate-100 text-[11px] font-bold text-slate-700 flex justify-between"><span>${d.data().name}</span><span class="text-indigo-500 uppercase">Present</span></div>`).join('');
            });
        }

        // STUDENT ENGINE
        window.submitAttendance = async () => {
            const entered = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "LIVE_ROOM"));
            
            if (!snap.exists() || !snap.data().active) return alert("Teacher hasn't started the session yet!");

            if (snap.data().code === entered) {
                // Check if already present
                const q = query(collection(db, "attendance"), 
                            where("uid", "==", userData.uid), 
                            where("date", "==", new Date().toDateString()));
                const existing = await getDocs(q);
                
                if (!existing.empty) return alert("You've already marked your attendance for today!");

                await addDoc(collection(db, "attendance"), { 
                    uid: userData.uid, 
                    name: userData.name, 
                    date: new Date().toDateString() 
                });
                alert("Attendance Confirmed! ✓");
                document.getElementById('codeEntry').value = "";
            } else {
                alert("Incorrect Code. Look at the teacher's screen!");
            }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between text-xs font-bold shadow-sm">
                        <span>Attendance Session</span>
                        <span class="text-green-500">✓ RECORDED</span>
                    </div>`).join('');
            });
        }
    </script>
</body>
</html>
