<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Google Auth Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .code-font { font-family: 'Courier New', Courier, monospace; letter-spacing: 0.5rem; }
        .pulse-live { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="glass sticky top-0 z-[60] border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <span class="text-xl font-800 italic tracking-tight">SmartAttend</span>
        </div>
        <div id="navActions" class="hidden flex items-center gap-4">
            <span id="roleBadge" class="text-xs font-black px-3 py-1 bg-slate-200 rounded-lg text-slate-600 uppercase tracking-widest text-[10px]">User</span>
            <button onclick="logout()" class="text-sm font-bold text-slate-500 hover:text-red-500 transition">Sign Out</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        
        <section id="loginView" class="view-section active mt-20 max-w-sm mx-auto text-center">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h2 class="text-3xl font-800 mb-6 tracking-tight text-slate-800">Welcome</h2>
                <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-50 hover:border-slate-300 transition-all active:scale-95 shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                        <path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/>
                        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
                    </svg>
                    Continue with Google
                </button>
                <p class="mt-6 text-[11px] text-slate-400 font-bold uppercase tracking-widest">Student accounts auto-create</p>
            </div>
        </section>

        <section id="roleView" class="view-section mt-10 max-w-2xl mx-auto text-center">
            <h2 class="text-3xl font-800 mb-2">Complete your profile</h2>
            <p class="text-slate-500 mb-8 font-medium">Select your account type to continue.</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="assignRole('student')" class="bg-white p-8 rounded-[2rem] border-2 border-transparent hover:border-indigo-600 shadow-sm hover:shadow-xl transition-all group">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition">🎓</div>
                    <h3 class="font-800 text-lg">Student</h3>
                </button>
                <button onclick="assignRole('teacher')" class="bg-white p-8 rounded-[2rem] border-2 border-transparent hover:border-rose-500 shadow-sm hover:shadow-xl transition-all group">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition">👨‍🏫</div>
                    <h3 class="font-800 text-lg">Teacher</h3>
                </button>
                <button onclick="assignRole('admin')" class="bg-white p-8 rounded-[2rem] border-2 border-transparent hover:border-purple-600 shadow-sm hover:shadow-xl transition-all group">
                    <div class="text-4xl mb-4 group-hover:scale-110 transition">🛡️</div>
                    <h3 class="font-800 text-lg">Admin</h3>
                </button>
            </div>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-100">
                <h2 class="text-3xl font-800 mb-2">Check-in</h2>
                <div class="flex gap-4 mt-8">
                    <input type="text" id="codeEntry" maxlength="6" class="flex-1 p-5 rounded-2xl text-slate-900 text-3xl font-black text-center tracking-[0.5em] outline-none" placeholder="000000">
                    <button onclick="submitCode()" class="bg-white text-indigo-600 font-800 px-8 rounded-2xl">Submit</button>
                </div>
            </div>
            <div id="studentHistory" class="bg-white p-8 rounded-[2.5rem] border shadow-sm space-y-3"></div>
        </section>

        <section id="teacherView" class="view-section space-y-6">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border text-center">
                <div id="mainDisplayCode" class="text-8xl font-black code-font mb-6 tracking-tighter text-slate-300">------</div>
                <button id="sessionToggle" onclick="handleSession()" class="bg-indigo-600 text-white font-bold py-4 px-12 rounded-2xl hover:bg-indigo-700 transition">Start Session</button>
                <button onclick="openProjector()" class="ml-2 bg-slate-100 px-6 py-4 rounded-2xl font-bold">📺</button>
            </div>
            <div id="logContainer" class="bg-white p-8 rounded-[2.5rem] border shadow-sm"></div>
        </section>

        <section id="adminView" class="view-section">
             <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <h3 class="font-800 text-xl mb-6">System Users</h3>
                <div id="adminUserTable" class="space-y-2"></div>
             </div>
        </section>

    </main>

    <div id="projectorOverlay" class="hidden fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white text-center p-10">
        <button onclick="closeProjector()" class="absolute top-10 right-10 text-4xl opacity-50">✕</button>
        <div id="projectorCode" class="text-[15rem] font-black code-font">000000</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // FIX: Specifically bind the login to the button click to avoid popup blockers
        document.getElementById('googleBtn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error(e);
                alert("Google Sign-In failed: " + e.message);
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    routeUser(userDoc.data());
                } else {
                    showView('roleView');
                }
            } else {
                showView('loginView');
            }
        });

        window.assignRole = async (role) => {
            if (role === 'teacher' || role === 'admin') {
                const pin = prompt("Enter Security PIN:");
                if (pin !== '431298') return alert("Wrong PIN!");
            }
            const profile = { name: auth.currentUser.displayName, email: auth.currentUser.email, role: role, createdAt: serverTimestamp() };
            await setDoc(doc(db, "users", auth.currentUser.uid), profile);
            routeUser(profile);
        };

        function routeUser(p) {
            document.getElementById('navActions').classList.remove('hidden');
            document.getElementById('roleBadge').innerText = p.role;
            if (p.role === 'admin') showView('adminView');
            else if (p.role === 'teacher') showView('teacherView');
            else showView('studentView');
        }

        // Logic for teacher sessions and student submissions remains same as previous code...
        // [Add back handleSession(), submitCode(), etc. from previous response]
    </script>
</body>
</html>
