<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #eef2ff, #f8fafc); 
            min-height: 100-vh;
        }
        .view-section { display: none; }
        .view-section.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .code-input { letter-spacing: 0.5em; text-indent: 0.25em; }
        .teacher-card { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
    </style>
</head>
<body class="antialiased text-slate-900">

    <nav class="px-6 py-5 flex justify-between items-center sticky top-0 z-50 glass mb-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <span class="text-2xl font-800 tracking-tighter">SmartAttend<span class="text-indigo-600">.</span></span>
        </div>
        <div id="navActions" class="hidden">
            <button onclick="logout()" class="p-2 bg-rose-50 rounded-lg text-rose-500 hover:bg-rose-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 pb-20">

        <section id="loginView" class="view-section active mt-12 text-center">
            <div class="glass p-10 rounded-[3rem] shadow-2xl shadow-slate-200/50">
                <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
                    <span class="text-4xl">👋</span>
                </div>
                <h1 class="text-3xl font-800 tracking-tight mb-2">Ready to Start?</h1>
                <p class="text-slate-500 mb-10 font-medium">Log in with your college email</p>
                <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-xl shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all">
                    Continue with Google
                </button>
            </div>
        </section>

        <section id="roleView" class="view-section mt-10">
            <h2 class="text-center font-800 text-2xl mb-8">Identify Yourself</h2>
            <div class="grid grid-cols-1 gap-4">
                <button onclick="saveRole('student')" class="glass p-8 rounded-3xl text-left flex items-center gap-6 hover:border-indigo-400 transition-all group">
                    <span class="text-4xl group-hover:scale-110 transition">🎓</span>
                    <div>
                        <h3 class="font-800 text-lg">Student</h3>
                        <p class="text-sm text-slate-500">I am here to mark presence</p>
                    </div>
                </button>
                <button onclick="saveRole('teacher')" class="glass p-8 rounded-3xl text-left flex items-center gap-6 hover:border-indigo-400 transition-all group">
                    <span class="text-4xl group-hover:scale-110 transition">👨‍🏫</span>
                    <div>
                        <h3 class="font-800 text-lg">Teacher</h3>
                        <p class="text-sm text-slate-500">I am managing the session</p>
                    </div>
                </button>
            </div>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="teacher-card p-10 rounded-[3rem] text-white shadow-2xl shadow-indigo-300 relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-800 mb-2">Check-in</h2>
                    <p class="text-indigo-100 text-sm mb-8 opacity-90">Enter the code displayed on screen</p>
                    <input type="text" id="codeEntry" maxlength="6" class="w-full p-6 rounded-2xl text-slate-900 text-5xl font-black text-center code-input mb-6 shadow-2xl outline-none" placeholder="000000">
                    <button onclick="submitAttendance()" class="w-full bg-white text-indigo-600 font-900 py-5 rounded-2xl hover:bg-slate-50 active:scale-95 transition-all text-xl shadow-xl shadow-indigo-900/20">Mark Present</button>
                </div>
                <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-white/10 rounded-full"></div>
            </div>
            
            <div id="studentHistory"></div>
        </section>

        <section id="teacherView" class="view-section space-y-6">
            <div class="glass p-10 rounded-[3rem] text-center shadow-2xl">
                <span class="inline-block px-4 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest mb-6">Master Session</span>
                <div id="displayCode" class="text-8xl font-900 text-slate-200 mb-10 code-input">------</div>
                
                <div class="grid grid-cols-1 gap-3">
                    <button id="sessionBtn" onclick="toggleSession()" class="bg-indigo-600 text-white font-800 py-5 rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition">Generate Today's Code</button>
                    <button onclick="manualResetAndExport()" class="bg-white text-rose-500 border border-rose-100 font-800 py-4 rounded-2xl hover:bg-rose-50 transition text-sm">Reset & Download .txt</button>
                </div>
            </div>

            <div class="glass p-8 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-800 text-xl tracking-tight">Logs</h3>
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span id="count" class="font-800 text-indigo-600">0</span>
                    </div>
                </div>
                <div id="teacherLogs" class="space-y-3 max-h-72 overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('navActions').classList.remove('hidden');
                    routeUser();
                } else { switchView('roleView'); }
            } else { switchView('loginView'); }
        });

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("Teacher PIN:") !== '431298') return;
            await setDoc(doc(db, "users", auth.currentUser.uid), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, role });
            location.reload();
        };

        function routeUser() {
            if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
            else { switchView('studentView'); initStudent(); }
        }

        window.toggleSession = async () => {
            const ref = doc(db, "sessions", "LIVE_ROOM");
            const newCode = Math.floor(100000 + Math.random() * 900000).toString();
            await setDoc(ref, { code: newCode, active: true, date: new Date().toDateString() });
        };

        window.manualResetAndExport = async () => {
            if (!confirm("Export logs and clear database?")) return;
            const q = query(collection(db, "attendance"), where("date", "==", new Date().toDateString()));
            const snap = await getDocs(q);
            let log = `Attendance - ${new Date().toLocaleDateString()}\n--------------------\n`;
            const batch = writeBatch(db);
            snap.forEach(d => { log += `[PRESENT] ${d.data().name}\n`; batch.delete(d.ref); });
            const blob = new Blob([log], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Report_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
            await batch.commit();
            await deleteDoc(doc(db, "sessions", "LIVE_ROOM"));
            location.reload();
        };

        function initTeacher() {
            onSnapshot(doc(db, "sessions", "LIVE_ROOM"), (snap) => {
                if(snap.exists() && snap.data().active) {
                    document.getElementById('displayCode').innerText = snap.data().code;
                    document.getElementById('displayCode').classList.replace('text-slate-200', 'text-indigo-600');
                }
            });
            onSnapshot(collection(db, "attendance"), (snap) => {
                document.getElementById('count').innerText = snap.size;
                document.getElementById('teacherLogs').innerHTML = snap.docs.map(d => `
                    <div class="p-4 bg-white/50 rounded-2xl flex justify-between items-center text-sm font-bold border border-white/40">
                        <span class="text-slate-700">${d.data().name}</span>
                        <span class="text-indigo-500 text-[10px] bg-indigo-50 px-2 py-1 rounded-md uppercase">Verified</span>
                    </div>`).join('');
            });
        }

        window.submitAttendance = async () => {
            const entered = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "LIVE_ROOM"));
            if (snap.exists() && snap.data().active && snap.data().code === entered) {
                const q = query(collection(db, "attendance"), where("uid", "==", userData.uid), where("date", "==", new Date().toDateString()));
                const existing = await getDocs(q);
                if (!existing.empty) return alert("You are already marked present.");
                await addDoc(collection(db, "attendance"), { uid: userData.uid, name: userData.name, date: new Date().toDateString() });
                alert("Success! 🎉");
                document.getElementById('codeEntry').value = "";
            } else { alert("Invalid or Expired Code!"); }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `
                    <div class="glass p-5 rounded-3xl flex justify-between items-center font-bold text-sm shadow-sm border-white">
                        <span class="text-slate-500">${d.data().date}</span>
                        <span class="text-green-600">✓ PRESENT</span>
                    </div>`).join('');
            });
        }
    </script>
</body>
</html>
