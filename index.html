<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | College Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .code-font { font-family: 'Courier New', monospace; letter-spacing: 0.3em; }
        .progress-bar { transition: width 1s linear; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <span class="text-xl font-800 tracking-tighter text-indigo-600">SmartAttend</span>
        <div id="navActions" class="hidden flex gap-3">
            <button onclick="logout()" class="text-slate-400 font-bold text-xs">Logout</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6">

        <section id="loginView" class="view-section active mt-20 text-center">
            <button id="googleBtn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg">Login with Google</button>
        </section>

        <section id="roleView" class="view-section mt-10 space-y-4">
            <h2 class="text-2xl font-800 text-center">Select Role</h2>
            <button onclick="saveRole('student')" class="w-full bg-white p-6 rounded-2xl border-2 font-bold">Student</button>
            <button onclick="saveRole('teacher')" class="w-full bg-white p-6 rounded-2xl border-2 font-bold">Teacher</button>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-8 rounded-[2rem] text-white shadow-xl">
                <h2 class="text-xl font-800 mb-4">Enter Code</h2>
                <input type="text" id="codeEntry" maxlength="6" class="w-full p-4 rounded-xl text-slate-900 text-4xl font-black text-center code-font mb-4" placeholder="------">
                <button onclick="submitAttendance()" class="w-full bg-white text-indigo-600 font-800 py-4 rounded-xl">Submit Attendance</button>
            </div>
            <div id="studentHistory" class="space-y-2"></div>
        </section>

        <section id="teacherView" class="view-section text-center space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm">
                <div id="displayCode" class="text-7xl font-900 text-slate-200 mb-6 code-font">------</div>
                
                <div id="timerWrapper" class="hidden mb-6">
                    <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-1">
                        <span>Code expires in:</span>
                        <span id="secondsLabel">30s</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="timerBar" class="progress-bar bg-indigo-500 h-full w-full"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button id="sessionBtn" onclick="toggleSession()" class="bg-indigo-600 text-white font-800 py-4 rounded-2xl shadow-lg">Start Session</button>
                    <button onclick="manualResetAndExport()" class="bg-rose-50 text-rose-600 border border-rose-100 font-800 py-4 rounded-2xl">Reset & Save</button>
                </div>
            </div>
            <div id="teacherLogs" class="space-y-2 text-left"></div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- CUSTOMIZABLE CONSTANTS ---
        const CODE_COOLDOWN = 30; // Seconds before code changes (Increase for slow typers)
        const CYCLE_LIMIT = 20 * 60 * 60 * 1000; // 20 Hours session limit

        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;
        let rotationTimer = null;

        // AUTH Logic
        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('navActions').classList.remove('hidden');
                    routeUser();
                } else { switchView('roleView'); }
            } else { switchView('loginView'); }
        });

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("Teacher PIN:") !== '431298') return;
            await setDoc(doc(db, "users", auth.currentUser.uid), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, role });
            location.reload();
        };

        function routeUser() {
            if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
            else { switchView('studentView'); initStudent(); }
        }

        // TEACHER ENGINE
        window.toggleSession = async () => {
            const btn = document.getElementById('sessionBtn');
            const ref = doc(db, "sessions", "LIVE_ROOM");
            
            if (btn.innerText.includes("Start")) {
                btn.innerText = "Running...";
                document.getElementById('timerWrapper').classList.remove('hidden');
                let r = CODE_COOLDOWN;

                rotationTimer = setInterval(async () => {
                    if (r >= CODE_COOLDOWN) {
                        const code = Math.floor(100000 + Math.random() * 900000).toString();
                        await setDoc(ref, { code, active: true, startTime: serverTimestamp() }, { merge: true });
                        document.getElementById('displayCode').innerText = code;
                        document.getElementById('displayCode').classList.replace('text-slate-200', 'text-indigo-600');
                        r = 0;
                    }
                    r++;
                    let remaining = CODE_COOLDOWN - r;
                    document.getElementById('secondsLabel').innerText = remaining + "s";
                    document.getElementById('timerBar').style.width = (remaining / CODE_COOLDOWN * 100) + "%";
                }, 1000);
            }
        };

        window.manualResetAndExport = async () => {
            if (!confirm("This will save the current list to a file and CLEAR the database. Proceed?")) return;
            const q = query(collection(db, "attendance"), where("date", "==", new Date().toDateString()));
            const snap = await getDocs(q);
            let log = `Attendance Report: ${new Date().toLocaleString()}\n\n`;
            const batch = writeBatch(db);
            snap.forEach(d => {
                log += `- ${d.data().name}\n`;
                batch.delete(d.ref);
            });
            const blob = new Blob([log], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `attendance_${new Date().toLocaleDateString()}.txt`;
            link.click();
            await batch.commit();
            await deleteDoc(doc(db, "sessions", "LIVE_ROOM"));
            location.reload();
        };

        function initTeacher() {
            onSnapshot(collection(db, "attendance"), (snap) => {
                document.getElementById('teacherLogs').innerHTML = snap.docs
                    .map(d => `<div class="p-2 border-b text-xs font-bold">✓ ${d.data().name}</div>`).join('');
            });
        }

        // STUDENT ENGINE
        window.submitAttendance = async () => {
            const entered = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "LIVE_ROOM"));
            if (snap.exists() && snap.data().active && snap.data().code === entered) {
                const q = query(collection(db, "attendance"), where("uid", "==", userData.uid));
                const existing = await getDocs(q);
                if (!existing.empty) return alert("Already marked!");
                await addDoc(collection(db, "attendance"), { uid: userData.uid, name: userData.name, date: new Date().toDateString() });
                alert("Attendance Marked! ✓");
            } else { alert("Invalid or Expired Code!"); }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `<div class="bg-white p-4 rounded-xl border flex justify-between text-xs font-bold shadow-sm"><span>Class Session</span><span class="text-indigo-600">PRESENT</span></div>`).join('');
            });
        }
    </script>
</body>
</html>
