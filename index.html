<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Live Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .code-font { font-family: 'Courier New', monospace; letter-spacing: 0.4em; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-100">S</div>
            <span class="text-xl font-800 tracking-tighter">SmartAttend</span>
        </div>
        <div id="navActions" class="hidden flex items-center gap-4">
            <button onclick="resetAccount()" class="text-[10px] font-black uppercase bg-slate-100 text-slate-500 px-3 py-1.5 rounded-md hover:bg-slate-200 transition">Change Role</button>
            <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">

        <section id="loginView" class="view-section active mt-20 text-center">
            <div class="bg-white p-12 rounded-[2.5rem] shadow-xl border border-slate-100 max-w-md mx-auto">
                <h1 class="text-4xl font-800 mb-2 tracking-tight">Login</h1>
                <p class="text-slate-500 mb-10 font-medium">Classroom Attendance System</p>
                <button id="googleBtn" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-100 py-4 rounded-2xl font-bold hover:bg-slate-50 hover:border-indigo-200 transition-all active:scale-95">
                    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                    Continue with Google
                </button>
            </div>
        </section>

        <section id="roleView" class="view-section mt-10">
            <h2 class="text-3xl font-800 text-center mb-10">Select Your Role</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl mx-auto">
                <button onclick="saveRole('student')" class="bg-white p-10 rounded-[2.5rem] border-2 border-transparent hover:border-indigo-600 shadow-sm transition-all group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition">🎓</div>
                    <h3 class="font-800 text-xl text-slate-800">Student</h3>
                    <p class="text-slate-400 text-sm mt-2">I am attending class</p>
                </button>
                <button onclick="saveRole('teacher')" class="bg-white p-10 rounded-[2.5rem] border-2 border-transparent hover:border-rose-500 shadow-sm transition-all group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition">👨‍🏫</div>
                    <h3 class="font-800 text-xl text-slate-800">Teacher</h3>
                    <p class="text-slate-400 text-sm mt-2">I am leading class (PIN Req)</p>
                </button>
            </div>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-10 rounded-[3rem] text-white shadow-2xl shadow-indigo-200">
                <h2 class="text-2xl font-800 mb-6">Enter Class Code</h2>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="text" id="codeEntry" maxlength="6" class="flex-1 p-5 rounded-2xl text-slate-900 text-4xl font-black text-center code-font outline-none" placeholder="000000">
                    <button onclick="submitAttendance()" class="bg-white text-indigo-600 font-800 px-10 rounded-2xl hover:bg-slate-50 transition-all text-lg shadow-lg">Submit</button>
                </div>
            </div>
            <div id="studentHistory" class="space-y-3"></div>
        </section>

        <section id="teacherView" class="view-section text-center space-y-8">
            <div class="bg-white p-12 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden">
                <div id="statusBadge" class="hidden absolute top-8 left-1/2 -translate-x-1/2 px-4 py-1.5 bg-rose-100 text-rose-600 rounded-full text-[10px] font-black uppercase tracking-widest animate-pulse">Live</div>
                <h3 class="text-slate-400 text-xs font-black uppercase tracking-widest mb-10 mt-6">Current Class Code</h3>
                <div id="displayCode" class="text-9xl font-900 code-font text-slate-200 tracking-tighter mb-10">------</div>
                
                <div id="timerContainer" class="hidden max-w-xs mx-auto mb-10">
                    <div class="flex justify-between text-[11px] font-black text-slate-400 mb-2 uppercase">
                        <span>New Code in: <b id="rotTimer">10s</b></span>
                        <span>Ends in: <b id="sessionTimer">02:00</b></span>
                    </div>
                    <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                        <div id="rotBar" class="h-full bg-indigo-600 w-0 transition-all duration-1000 linear"></div>
                    </div>
                </div>

                <button id="sessionBtn" onclick="toggleSession()" class="bg-indigo-600 text-white font-800 px-16 py-5 rounded-2xl hover:bg-indigo-700 transition shadow-xl shadow-indigo-100">Start Session</button>
            </div>
            <div id="teacherLogs" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;
        let timer = null;

        // UI HELPERS
        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // AUTH
        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());
        
        window.resetAccount = async () => {
            if (confirm("Reset role and profile?")) {
                await deleteDoc(doc(db, "users", auth.currentUser.uid));
                location.reload();
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('navActions').classList.remove('hidden');
                    routeUser();
                } else {
                    switchView('roleView');
                }
            } else {
                switchView('loginView');
            }
        });

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("Teacher PIN:") !== '431298') return alert("Forbidden");
            const profile = { uid: auth.currentUser.uid, name: auth.currentUser.displayName, email: auth.currentUser.email, role: role };
            await setDoc(doc(db, "users", auth.currentUser.uid), profile);
            userData = profile;
            routeUser();
        };

        function routeUser() {
            if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
            else { switchView('studentView'); initStudent(); }
        }

        // TEACHER LOGIC
        window.toggleSession = async () => {
            const btn = document.getElementById('sessionBtn');
            const sessionRef = doc(db, "sessions", "LIVE_ROOM");
            
            if (btn.innerText.includes("Start")) {
                let s = 120, r = 10;
                btn.innerText = "Stop Session";
                btn.classList.replace('bg-indigo-600', 'bg-rose-600');
                document.getElementById('statusBadge').classList.remove('hidden');
                document.getElementById('timerContainer').classList.remove('hidden');
                document.getElementById('displayCode').classList.replace('text-slate-200', 'text-indigo-600');

                timer = setInterval(async () => {
                    if (r >= 10) {
                        const code = Math.floor(100000 + Math.random() * 900000).toString();
                        await setDoc(sessionRef, { code, active: true }, { merge: true });
                        document.getElementById('displayCode').innerText = code;
                        r = 0;
                    }
                    r++; s--;
                    document.getElementById('rotBar').style.width = (r * 10) + "%";
                    document.getElementById('rotTimer').innerText = (10 - r) + "s";
                    document.getElementById('sessionTimer').innerText = `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
                    if (s <= 0) toggleSession();
                }, 1000);
            } else {
                clearInterval(timer);
                await updateDoc(sessionRef, { active: false });
                location.reload();
            }
        };

        function initTeacher() {
            onSnapshot(query(collection(db, "attendance"), where("date", "==", new Date().toDateString())), (snap) => {
                document.getElementById('teacherLogs').innerHTML = snap.docs.map(d => `<div class="bg-indigo-50 text-indigo-700 p-3 rounded-2xl font-bold text-[10px] text-center border border-indigo-100">${d.data().name}</div>`).join('');
            });
        }

        // STUDENT LOGIC
        window.submitAttendance = async () => {
            const code = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "LIVE_ROOM"));
            
            if (snap.exists() && snap.data().active && snap.data().code === code) {
                const q = query(collection(db, "attendance"), where("uid", "==", userData.uid), where("date", "==", new Date().toDateString()));
                const existing = await getDocs(q);
                if (!existing.empty) return alert("Already marked for today!");

                await addDoc(collection(db, "attendance"), { uid: userData.uid, name: userData.name, date: new Date().toDateString(), timestamp: serverTimestamp() });
                alert("Attendance Confirmed! ✓");
                document.getElementById('codeEntry').value = "";
            } else {
                alert("Invalid or Expired Code!");
            }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `<div class="bg-white p-4 rounded-xl border flex justify-between font-bold text-sm"><span>Lecture Session</span><span class="text-emerald-500">PRESENT</span></div>`).join('');
            });
        }
    </script>
</body>
</html>
