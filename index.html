<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            min-height: 100vh;
        }
        .view-section { display: none; }
        .view-section.active { display: flex; flex-direction: column; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .code-display { letter-spacing: -0.02em; line-height: 1; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <nav class="px-6 py-4 flex justify-between items-center glass sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
            </div>
            <span class="text-xl font-800 tracking-tighter">SmartAttend<span class="text-indigo-600">.</span></span>
        </div>
        <button id="logoutBtn" onclick="logout()" class="hidden p-2 text-rose-500 bg-rose-50 rounded-lg hover:bg-rose-100 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
        </button>
    </nav>

    <main class="max-w-md mx-auto p-4 flex flex-col gap-6">

        <section id="loginView" class="view-section active mt-12 text-center">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-slate-100">
                <h1 class="text-3xl font-800 mb-2">Classroom Portal</h1>
                <p class="text-slate-500 mb-8 font-medium">Log in to continue</p>
                <button id="googleBtn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition">Sign in with Google</button>
            </div>
        </section>

        <section id="roleView" class="view-section space-y-4">
            <h2 class="text-center font-800 text-2xl mb-4">Choose Account</h2>
            <button onclick="saveRole('student')" class="bg-white p-6 rounded-3xl text-left border-2 border-transparent hover:border-indigo-500 shadow-sm transition-all flex items-center gap-4">
                <span class="text-3xl">🎓</span>
                <div><h3 class="font-800">Student</h3><p class="text-xs text-slate-500">I am here for attendance</p></div>
            </button>
            <button onclick="saveRole('teacher')" class="bg-white p-6 rounded-3xl text-left border-2 border-transparent hover:border-rose-500 shadow-sm transition-all flex items-center gap-4">
                <span class="text-3xl">👨‍🏫</span>
                <div><h3 class="font-800">Teacher</h3><p class="text-xs text-slate-500">I am leading the session</p></div>
            </button>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-8 rounded-[2.5rem] text-white shadow-2xl shadow-indigo-200 text-center">
                <h2 class="text-xl font-800 mb-6">Enter Class Code</h2>
                <input type="text" id="codeEntry" maxlength="6" class="w-full p-4 rounded-2xl text-slate-900 text-5xl font-black text-center mb-6 outline-none" placeholder="000000">
                <button onclick="submitAttendance()" class="w-full bg-white text-indigo-600 font-900 py-4 rounded-2xl shadow-lg active:scale-95 transition">Mark Present</button>
            </div>
            <div id="studentHistory" class="space-y-2"></div>
        </section>

        <section id="teacherView" class="view-section space-y-6">
            <div class="bg-white p-8 rounded-[2.5rem] text-center border border-slate-100 shadow-xl">
                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-black uppercase tracking-widest">Active Session</span>
                <div id="displayCode" class="text-6xl sm:text-7xl font-900 text-indigo-600 my-8 code-display tracking-tight">------</div>
                
                <div class="flex flex-col gap-2">
                    <button onclick="toggleSession()" class="bg-indigo-600 text-white font-800 py-4 rounded-2xl shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">Generate New Code</button>
                    <button onclick="manualResetAndExport()" class="text-rose-500 bg-rose-50 font-800 py-3 rounded-2xl text-xs">End Day & Download .txt</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-800 text-slate-700">Logs</h3>
                    <span id="count" class="bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-[10px] font-black">0</span>
                </div>
                <div id="teacherLogs" class="space-y-2 max-h-60 overflow-y-auto pr-2"></div>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG - Replace with your details
        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('logoutBtn').classList.remove('hidden');
                    routeUser();
                } else { switchView('roleView'); }
            } else { switchView('loginView'); }
        });

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("PIN:") !== '431298') return;
            await setDoc(doc(db, "users", auth.currentUser.uid), { uid: auth.currentUser.uid, name: auth.currentUser.displayName, role });
            location.reload();
        };

        function routeUser() {
            if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
            else { switchView('studentView'); initStudent(); }
        }

        // TEACHER
        window.toggleSession = async () => {
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            await setDoc(doc(db, "sessions", "LIVE_ROOM"), { code, active: true, date: new Date().toDateString() });
        };

        window.manualResetAndExport = async () => {
            if (!confirm("Save logs and clear today's attendance?")) return;
            const q = query(collection(db, "attendance"), where("date", "==", new Date().toDateString()));
            const snap = await getDocs(q);
            let log = `Report: ${new Date().toLocaleDateString()}\n\n`;
            const batch = writeBatch(db);
            snap.forEach(d => { log += `${d.data().name}\n`; batch.delete(d.ref); });
            
            const blob = new Blob([log], { type: 'text/plain' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Attendance_${new Date().toISOString().split('T')[0]}.txt`;
            link.click();
            
            await batch.commit();
            await deleteDoc(doc(db, "sessions", "LIVE_ROOM"));
            location.reload();
        };

        function initTeacher() {
            onSnapshot(doc(db, "sessions", "LIVE_ROOM"), (snap) => {
                if(snap.exists()) document.getElementById('displayCode').innerText = snap.data().code;
            });
            onSnapshot(collection(db, "attendance"), (snap) => {
                const todayDocs = snap.docs.filter(d => d.data().date === new Date().toDateString());
                document.getElementById('count').innerText = todayDocs.length;
                document.getElementById('teacherLogs').innerHTML = todayDocs.map(d => `
                    <div class="p-3 bg-slate-50 rounded-xl border flex justify-between font-bold text-[11px]">
                        <span>${d.data().name}</span><span class="text-indigo-500 uppercase">Verified</span>
                    </div>`).join('');
            });
        }

        // STUDENT
        window.submitAttendance = async () => {
            const entered = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "LIVE_ROOM"));
            if (snap.exists() && snap.data().code === entered) {
                const q = query(collection(db, "attendance"), where("uid", "==", userData.uid), where("date", "==", new Date().toDateString()));
                const existing = await getDocs(q);
                if (!existing.empty) return alert("Already marked present!");
                
                await addDoc(collection(db, "attendance"), { uid: userData.uid, name: userData.name, date: new Date().toDateString() });
                alert("Success! 🎉");
                document.getElementById('codeEntry').value = "";
            } else { alert("Invalid Code!"); }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `
                    <div class="bg-white p-4 rounded-2xl border flex justify-between font-bold text-xs shadow-sm">
                        <span>${d.data().date}</span><span class="text-green-500">✓ PRESENT</span>
                    </div>`).join('');
            });
        }
    </script>
</body>
</html>
