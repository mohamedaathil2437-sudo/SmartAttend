<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAttend | Sync Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .code-font { font-family: 'Courier New', monospace; letter-spacing: 0.3em; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <span class="text-xl font-800 tracking-tighter text-indigo-600">SmartAttend</span>
        <div id="navActions" class="hidden flex gap-2">
            <button onclick="resetAccount()" class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded">Reset Role</button>
            <button onclick="logout()" class="text-red-500 font-bold text-xs">Logout</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-6">

        <section id="loginView" class="view-section active mt-20 text-center">
            <button id="googleBtn" class="w-full bg-white border-2 p-4 rounded-2xl font-bold shadow-sm">Sign in with Google</button>
        </section>

        <section id="roleView" class="view-section mt-10 space-y-4">
            <h2 class="text-2xl font-800 text-center">I am a...</h2>
            <button onclick="saveRole('student')" class="w-full bg-white p-8 rounded-2xl border-2 hover:border-indigo-600 font-bold">Student</button>
            <button onclick="saveRole('teacher')" class="w-full bg-white p-8 rounded-2xl border-2 hover:border-rose-600 font-bold">Teacher</button>
        </section>

        <section id="studentView" class="view-section space-y-6">
            <div class="bg-indigo-600 p-8 rounded-[2rem] text-white">
                <h2 class="text-xl font-800 mb-4">Enter Live Code</h2>
                <input type="text" id="codeEntry" maxlength="6" class="w-full p-4 rounded-xl text-slate-900 text-3xl text-center code-font mb-4" placeholder="000000">
                <button onclick="submitAttendance()" class="w-full bg-white text-indigo-600 font-800 py-4 rounded-xl">Verify & Mark Present</button>
            </div>
            <div id="studentHistory" class="space-y-2"></div>
        </section>

        <section id="teacherView" class="view-section text-center space-y-6">
            <div class="bg-white p-10 rounded-[2rem] border shadow-sm">
                <div id="displayCode" class="text-6xl font-900 text-slate-300 mb-6 code-font">------</div>
                <button id="sessionBtn" onclick="toggleSession()" class="bg-indigo-600 text-white font-800 px-8 py-4 rounded-xl">Start Session</button>
                <p id="timerLabel" class="mt-4 text-xs font-bold text-slate-400 uppercase hidden">Rotating in: <span id="rotTimer">10</span>s</p>
            </div>
            <div id="teacherLogs" class="grid grid-cols-2 gap-2"></div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUMh49zJsFL_FUGLHdi7I7kBqm7H4gsUA",
            authDomain: "smart-attend-d0e2d.firebaseapp.com",
            projectId: "smart-attend-d0e2d",
            storageBucket: "smart-attend-d0e2d.firebasestorage.app",
            messagingSenderId: "1030572768667",
            appId: "1:1030572768667:web:45d93bc285ac1f6bb8b53e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let userData = null;
        let tInterval = null;

        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth).then(() => location.reload());
        window.resetAccount = async () => { if(confirm("Reset?")) { await deleteDoc(doc(db, "users", auth.currentUser.uid)); location.reload(); }};

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('navActions').classList.remove('hidden');
                    if (userData.role === 'teacher') { switchView('teacherView'); initTeacher(); }
                    else { switchView('studentView'); initStudent(); }
                } else { switchView('roleView'); }
            } else { switchView('loginView'); }
        });

        window.saveRole = async (role) => {
            if (role === 'teacher' && prompt("PIN:") !== '431298') return;
            const p = { uid: auth.currentUser.uid, name: auth.currentUser.displayName, role };
            await setDoc(doc(db, "users", auth.currentUser.uid), p);
            location.reload();
        };

        // --- TEACHER ---
        window.toggleSession = async () => {
            const btn = document.getElementById('sessionBtn');
            const ref = doc(db, "sessions", "GLOBAL_SESSION");
            
            if (btn.innerText.includes("Start")) {
                btn.innerText = "Stop Session";
                document.getElementById('timerLabel').classList.remove('hidden');
                let r = 10;
                tInterval = setInterval(async () => {
                    if (r >= 10) {
                        const code = Math.floor(100000 + Math.random() * 900000).toString();
                        await setDoc(ref, { code, active: true });
                        document.getElementById('displayCode').innerText = code;
                        document.getElementById('displayCode').classList.replace('text-slate-300', 'text-indigo-600');
                        r = 0;
                    }
                    r++;
                    document.getElementById('rotTimer').innerText = 11 - r;
                }, 1000);
            } else {
                clearInterval(tInterval);
                await updateDoc(ref, { active: false });
                location.reload();
            }
        };

        function initTeacher() {
            onSnapshot(collection(db, "attendance"), (snap) => {
                document.getElementById('teacherLogs').innerHTML = snap.docs
                    .filter(d => d.data().date === new Date().toDateString())
                    .map(d => `<div class="bg-slate-100 p-2 rounded text-[10px] font-bold">${d.data().name}</div>`).join('');
            });
        }

        // --- STUDENT ---
        window.submitAttendance = async () => {
            const entered = document.getElementById('codeEntry').value.trim();
            const snap = await getDoc(doc(db, "sessions", "GLOBAL_SESSION"));
            
            if (!snap.exists()) return alert("Teacher hasn't started the session!");
            const data = snap.data();

            if (data.active && data.code === entered) {
                await addDoc(collection(db, "attendance"), { 
                    uid: userData.uid, 
                    name: userData.name, 
                    date: new Date().toDateString() 
                });
                alert("Success!");
                document.getElementById('codeEntry').value = "";
            } else {
                alert(`Invalid. Database says: ${data.code} | You typed: ${entered}`);
            }
        };

        function initStudent() {
            onSnapshot(query(collection(db, "attendance"), where("uid", "==", userData.uid)), (snap) => {
                document.getElementById('studentHistory').innerHTML = snap.docs.map(d => `<div class="bg-white p-3 border rounded-xl flex justify-between text-xs font-bold"><span>Lecture</span><span class="text-green-500">PRESENT</span></div>`).join('');
            });
        }
    </script>
</body>
</html>
